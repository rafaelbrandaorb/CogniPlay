<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcessiQuiz Play - Edição Super Colorida</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#651fff">
    
    <style>
        :root {
            --bg-gradiente: linear-gradient(135deg, #651fff, #8e24aa);
            --bg-card: #ffff00;
            --texto-escuro: #121212;
            --cor-botao-padrao: #00e5ff;
            --cor-acerto: #00e676;
            --cor-erro: #ff1744;
            --cor-borda: #304ffe;
        }

        body {
            background: var(--bg-gradiente);
            color: var(--texto-escuro);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 95vh;
        }

        .painel {
            background: var(--bg-card);
            border-radius: 32px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 5px solid var(--cor-borda);
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        .campo-texto {
            width: 90%;
            padding: 18px;
            border-radius: 20px;
            border: 4px solid var(--cor-borda);
            background: #ffffff;
            color: #000;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
        }

        .btn-principal {
            width: 100%;
            background: #ff007f;
            color: white;
            border: 4px solid var(--cor-borda);
            padding: 18px;
            border-radius: 20px;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--cor-borda);
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .btn-principal:active { transform: translateY(6px); box-shadow: 0 2px 0 var(--cor-borda); }

        .indicador-nivel {
            background: #ff9100;
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: 900;
            font-size: 16px;
            display: inline-block;
            border: 3px solid var(--cor-borda);
        }

        .barra-progresso-container {
            width: 100%;
            background: #ffffff;
            height: 20px;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
            border: 3px solid var(--cor-borda);
        }
        .barra-progresso { height: 100%; width: 0%; background: #ff007f; transition: width 0.3s; }

        .card-imagem-estimulo {
            width: 180px;
            height: 180px;
            background: #ffffff;
            border-radius: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100px;
            margin: 0 auto 25px auto;
            border: 5px solid var(--cor-borda);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .btn-resposta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
            background: var(--cor-botao-padrao);
            color: var(--texto-escuro);
            border: 4px solid var(--cor-borda);
            padding: 18px;
            margin: 15px 0;
            border-radius: 24px;
            font-size: 22px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--cor-borda);
            transition: all 0.1s;
        }
        .btn-resposta:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--cor-borda); }
        
        .feedback-acerto { background: var(--cor-acerto) !important; color: #000 !important; }
        .feedback-erro { background: var(--cor-erro) !important; color: #fff !important; }
        #texto-status { font-size: 26px; font-weight: 900; margin-top: 15px; height: 35px; text-shadow: 1px 1px 0px #fff; }
    </style>
</head>
<body>

    <div class="painel">
        <div id="tela-login">
            <h2 style="font-size: 32px; color: var(--cor-borda); margin-top:0; font-weight: 900;"><i class="fa-solid fa-face-laugh-beam" style="color: #ff007f;"></i> AcessiQuiz</h2>
            <p style="color: #334155; font-size: 18px; font-weight: bold; margin-bottom: 25px;">Escreve o teu nome para começar a aventura:</p>
            <input type="text" id="input-nome-crianca" class="campo-texto" placeholder="Teu Nome Aqui" autocomplete="off">
            <button class="btn-principal" onclick="iniciarSessao()">COMEÇAR! 🚀</button>
        </div>

        <div id="conteudo-jogo" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="indicador-nivel" id="label-nivel">Nível 1</div>
                <span id="categoria-label" style="font-weight: 900; color: var(--cor-borda); font-size: 15px; background: #fff; padding: 5px 10px; border-radius: 10px; border: 2px solid var(--cor-borda);"></span>
            </div>
            
            <div class="barra-progresso-container">
                <div class="barra-progresso" id="barra-progresso"></div>
            </div>

            <div id="campo-pergunta" style="font-size: 24px; font-weight: 900; color: var(--cor-borda); margin-bottom: 20px; line-height: 1.3;"></div>
            <div class="card-imagem-estimulo" id="figura-estimulo"></div>
            <div id="campo-opcoes"></div>
            <div id="texto-status"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8xX4K-RKCgJ0EEbQ00sKVkMWPDepshg8",
            authDomain: "acessiquiz.firebaseapp.com",
            projectId: "acessiquiz",
            storageBucket: "acessiquiz.firebasestorage.app",
            messagingSenderId: "938864321076",
            appId: "1:938864321076:web:26d788b1ab95efc6d86061",
            measurementId: "G-XZ9J8R2SJ9"
        };

        const app = initializeApp(firebaseConfig);
        
        // Ativação do Suporte Offline Nativo do Firebase
        const db = initializeFirestore(app, {
            localCache: persistentLocalCache({
                tabManager: persistentMultipleTabManager()
            })
        });

        const bancoPerguntas = [
            {
                nivelNome: "Nível 1",
                pergunta: "Carrega no botão que tem a MESMA COR da estrela!",
                icone: "fa-solid fa-star",
                estiloIcone: "color: #ff3d00;",
                categoria: "Cores (Zero Leitura)",
                alternativas: [
                    { texto: "COR LARANJA", correta: true, icone: "fa-solid fa-square", estilo: "color: #ff3d00;" },
                    { texto: "COR AZUL", correta: false, icone: "fa-solid fa-square", estilo: "color: #00b0ff;" }
                ]
            },
            {
                nivelNome: "Nível 2",
                pergunta: "Encontra a forma geométrica IGUAL à do quadrado:",
                icone: "fa-solid fa-square-full",
                estiloIcone: "color: #651fff;",
                categoria: "Formas (Zero Leitura)",
                alternativas: [
                    { texto: "QUADRADO", correta: true, icone: "fa-solid fa-square", estilo: "color: #121212;" },
                    { texto: "TRIÂNGULO", correta: false, icone: "fa-solid fa-triangle-exclamation", estilo: "color: #121212;" }
                ]
            },
            {
                nivelNome: "Nível 3",
                pergunta: "Esquece as cores! Qual destas figuras é um ANIMAL?",
                icone: "fa-solid fa-cat",
                estiloIcone: "color: #00b0ff;", 
                categoria: "Controle Inibitório",
                alternativas: [
                    { texto: "É um Gato", correta: true, icone: "fa-solid fa-dog", estilo: "color: #ff007f;" },
                    { texto: "É uma Maçã", correta: false, icone: "fa-solid fa-apple-whole", estilo: "color: #00e676;" }
                ]
            }
        ];

        let nomePaciente = "";
        let idSessaoUnica = "";
        let indiceAtual = 0;
        let tempoInicioQuestao = 0;

        window.iniciarSessao = function() {
            const inputNome = document.getElementById('input-nome-crianca').value.trim();
            if(!inputNome) {
                alert("Por favor, digita o teu nome!");
                return;
            }
            nomePaciente = inputNome;
            idSessaoUnica = "sessao_" + Date.now();
            
            document.getElementById('tela-login').style.display = "none";
            document.getElementById('conteudo-jogo').style.display = "block";
            atualizarJogo();
        }

        window.atualizarJogo = function() {
            const progressoPorcento = (indiceAtual / bancoPerguntas.length) * 100;
            document.getElementById('barra-progresso').style.width = `${progressoPorcento}%`;

            if (indiceAtual >= bancoPerguntas.length) {
                document.getElementById('campo-pergunta').innerText = "Parabéns! Conseguiste! 🏆";
                document.getElementById('figura-estimulo').innerHTML = '<i class="fa-solid fa-trophy" style="color:#ffaa00; text-shadow: 0 0 20px #ffaa00;"></i>';
                document.getElementById('campo-opcoes').innerHTML = "";
                document.getElementById('texto-status').style.color = "var(--cor-acerto)";
                document.getElementById('texto-status').innerText = "O teu progresso foi guardado com sucesso!";
                return;
            }

            const dadosNivel = bancoPerguntas[indiceAtual];
            document.getElementById('label-nivel').innerText = dadosNivel.nivelNome;
            document.getElementById('categoria-label').innerText = dadosNivel.categoria;
            document.getElementById('campo-pergunta').innerText = dadosNivel.pergunta;
            
            const divEstimulo = document.getElementById('figura-estimulo');
            divEstimulo.innerHTML = `<i class="${dadosNivel.icone}" style="${dadosNivel.estiloIcone || ''}"></i>`;
            
            const container = document.getElementById('campo-opcoes');
            container.innerHTML = "";
            document.getElementById('texto-status').innerText = "";

            dadosNivel.alternativas.forEach(alt => {
                const botao = document.createElement('button');
                botao.className = 'btn-resposta';
                botao.innerHTML = `<i class="${alt.icone}" style="${alt.estilo || ''}"></i> <span style="margin-left:8px;">${alt.texto}</span>`;
                botao.onclick = () => checarResposta(alt.correta, botao, dadosNivel.categoria);
                container.appendChild(botao);
            });

            tempoInicioQuestao = Date.now();
        }

        async function checarResposta(correta, botaoElemento, categoria) {
            const tempoDecisao = (Date.now() - tempoInicioQuestao) / 1000;
            document.querySelectorAll('.btn-resposta').forEach(b => b.disabled = true);

            const status = document.getElementById('texto-status');

            if (correta) {
                botaoElemento.classList.add('feedback-acerto');
                status.style.color = "#00c853";
                status.innerHTML = "INCRÍVEL! ✨🎉";
            } else {
                botaoElemento.classList.add('feedback-erro');
                status.style.color = "var(--cor-erro)";
                status.innerHTML = "Enviado! Vamos à próxima! 🚀";
            }

            try {
                await addDoc(collection(db, "telemetria_acessiquiz"), {
                    alunoNome: nomePaciente,
                    sessaoID: idSessaoUnica,
                    nivel: indiceAtual + 1,
                    categoriaAEE: categoria,
                    tempoRespostaSegundos: Number(tempoDecisao),
                    comportamentoAssertivo: correta,
                    horarioRegistro: new Date().toISOString()
                });
            } catch (e) {
                console.error("Dados salvos localmente (Aguardando conexão): ", e);
            }

            setTimeout(() => {
                indiceAtual++;
                atualizarJogo();
            }, 1800);
        }
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('AcessiQuiz pronto para rodar Offline!'))
                    .catch(err => console.log('Erro ao registar PWA', err));
            });
        }
    </script>
</body>
</html>
